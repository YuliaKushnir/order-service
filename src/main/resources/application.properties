spring.application.name=order-service
server.port=8083

webclient-url=http://localhost:8080
frontend-url=http://localhost:3000

spring.datasource.url=jdbc:postgresql://localhost:5432/is_order
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.liquibase.change-log=classpath:liquibase-changelog.xml
spring.liquibase.enabled=true

cloudinary.cloud-name=${cloudinary_cloud-name}
cloudinary.api-key=${cloudinary_api-key}
cloudinary.api-secret=${cloudinary_api_secret}

spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=1000MB

spring.cloud.consul.host=localhost
spring.cloud.consul.port=8500
spring.cloud.consul.discovery.enabled=true
spring.cloud.consul.discovery.register=true
spring.cloud.consul.discovery.service-name=${spring.application.name}

spring.security.oauth2.resourceserver.jwt.issuer-uri: http://localhost:8181/realms/is-order-processing

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always